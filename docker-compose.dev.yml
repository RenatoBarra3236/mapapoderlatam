services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mapapoderlatam
      POSTGRES_USER: mapapoder
      POSTGRES_PASSWORD: mapapoder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapapoder -d mapapoderlatam"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
